server:
  port: 8080

spring:
  application:
    name: startalk
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/startalk?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  redis:
    host: localhost
    port: 6379
    password:
    database: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.startalk.startalk.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: startalkSecretKey2024ForAIEnglishLearningPlatform
  expiration: 604800000
  header: Authorization
  prefix: Bearer

aliyun:
  sms:
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    sign-name: StarTalk少儿英语
    template-code: SMS_xxxxxxx

wechat:
  appid: your-wechat-appid
  secret: your-wechat-secret

ai:
  provider: chatglm
  chatglm:
    api-key: 769cb0f7bbad4f3d8e5cee63d36ab141.m3T2mr3uwCMAovek
